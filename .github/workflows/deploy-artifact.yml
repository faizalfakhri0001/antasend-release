name: Deploy verified artifact
run-name: Deploy ${{ inputs.release_tag }}

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Signed origin3 release tag
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: artifact-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: [self-hosted, Linux, X64, apipilot-production]
    outputs:
      backend: ${{ steps.contract.outputs.backend }}
      source_sha: ${{ steps.contract.outputs.source_sha }}
    steps:
      - uses: actions/checkout@v5
      - name: Download only this release's assets
        env: { GH_TOKEN: "${{ github.token }}", RELEASE_TAG: "${{ inputs.release_tag }}" }
        shell: bash
        run: |
          set -Eeuo pipefail
          curl --fail --silent --show-error --location \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" > release.json
          RELEASE_TAG="$RELEASE_TAG" node <<'NODE'
          const fs = require('fs');
          const release = JSON.parse(fs.readFileSync('release.json', 'utf8'));
          const allowed = new Set(['backend-release-linux-amd64.tar.gz', 'release-manifest.json', 'SHA256SUMS', 'SHA256SUMS.asc']);
          const assets = release.assets || [];
          if (!release.tag_name || release.tag_name !== process.env.RELEASE_TAG || assets.length !== 4 || assets.some(asset => !allowed.has(asset.name)) || new Set(assets.map(asset => asset.name)).size !== assets.length) throw new Error('release asset inventory is invalid');
          fs.mkdirSync('release-assets', {recursive: true});
          Promise.all(assets.map(async asset => {
            const response = await fetch(asset.browser_download_url);
            if (!response.ok) throw new Error(`download failed for ${asset.name}: ${response.status}`);
            fs.writeFileSync(`release-assets/${asset.name}`, Buffer.from(await response.arrayBuffer()), {mode: 0o600});
          })).catch(error => { console.error(error.message); process.exit(1); });
          NODE
      - name: Verify signature, checksums, schema, and archive allowlists
        id: contract
        shell: bash
        run: |
          set -Eeuo pipefail
          cd release-assets
          gpg --batch --dearmor < ../keys/api-pilot-release-public.asc > ../public-keyring.gpg
          gpgv --keyring ../public-keyring.gpg SHA256SUMS.asc SHA256SUMS
          sha256sum --strict --check SHA256SUMS
          RELEASE_TAG="${{ inputs.release_tag }}" node <<'NODE'
          const crypto = require('crypto');
          const fs = require('fs');
          const fail = message => { console.error(message); process.exit(1); };
          const manifest = JSON.parse(fs.readFileSync('release-manifest.json', 'utf8'));
          const top = ['schemaVersion', 'tag', 'sourceRepository', 'sourceSha', 'builtAt', 'components', 'artifacts'];
          if (Object.keys(manifest).sort().join() !== top.sort().join() || manifest.schemaVersion !== 1 || manifest.tag !== process.env.RELEASE_TAG || manifest.sourceRepository !== 'faizalfakhri0001/antasend' || !/^[0-9a-f]{40}$/.test(manifest.sourceSha)) fail('invalid release manifest');
          if (!manifest.components || Object.keys(manifest.components).length !== 1 || manifest.components.backend !== true || !Array.isArray(manifest.artifacts)) fail('invalid component contract');
          const declared = manifest.artifacts.map(item => item.name).sort();
          const actual = fs.readdirSync('.').filter(name => !['release-manifest.json', 'SHA256SUMS', 'SHA256SUMS.asc'].includes(name)).sort();
          if (declared.join() !== actual.join() || new Set(declared).size !== declared.length) fail('unknown, missing, or duplicate release asset');
          for (const asset of manifest.artifacts) {
            if (asset.name !== 'backend-release-linux-amd64.tar.gz' || !/^[0-9a-f]{64}$/.test(asset.sha256)) fail('invalid artifact declaration');
            const digest = crypto.createHash('sha256').update(fs.readFileSync(asset.name)).digest('hex');
            if (digest !== asset.sha256) fail(`manifest digest mismatch for ${asset.name}`);
          }
          if (declared.join() !== 'backend-release-linux-amd64.tar.gz') fail('component artifacts do not match manifest');
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `backend=true\nsource_sha=${manifest.sourceSha}\n`);
          NODE
          backend="$(node -e 'console.log(JSON.parse(require("fs").readFileSync("release-manifest.json")).components.backend)')"
          [[ "$backend" == true ]]
          tar -tzf backend-release-linux-amd64.tar.gz | sed 's:/$::' | sort -u | diff -u <(printf '%s\n' backend backend/bin backend/bin/api backend/bin/bootstrap-superuser backend/bin/release-migrate backend/bin/worker backend/deployment.env release-manifest.txt) -
      - name: Stage verified assets for self-hosted deployment jobs
        env: { RELEASE_TAG: "${{ inputs.release_tag }}", VERIFIED_RELEASE_ROOT: /home/wakatta/actions-runner-origin3/verified-releases }
        shell: bash
        run: |
          set -Eeuo pipefail
          destination="$VERIFIED_RELEASE_ROOT/$RELEASE_TAG"
          mkdir -p "$VERIFIED_RELEASE_ROOT"
          staging="$(mktemp -d "$VERIFIED_RELEASE_ROOT/.${RELEASE_TAG}.XXXXXX")"
          trap 'rm -rf "$staging"' EXIT
          cp -a release-assets/. "$staging/"
          rm -rf "$destination"
          mv "$staging" "$destination"
          trap - EXIT

  backend:
    needs: verify
    if: needs.verify.outputs.backend == 'true'
    runs-on: [self-hosted, Linux, X64, apipilot-production]
    environment: production
    env:
      API_HEALTH_BASE_URL: https://api-apipilot.coopstack.cloud
      HEALTH_RETRY_ATTEMPTS: "36"
      HEALTH_RETRY_DELAY_SECONDS: "5"
    steps:
      - name: Load verified assets from the self-hosted staging area
        env: { RELEASE_TAG: "${{ inputs.release_tag }}", VERIFIED_RELEASE_ROOT: /home/wakatta/actions-runner-origin3/verified-releases }
        run: |
          set -Eeuo pipefail
          test -d "$VERIFIED_RELEASE_ROOT/$RELEASE_TAG"
          cp -a "$VERIFIED_RELEASE_ROOT/$RELEASE_TAG" release-assets
      - name: Preflight deployment environment patch
        shell: bash
        run: |
          set -Eeuo pipefail
          tar -xOf release-assets/backend-release-linux-amd64.tar.gz backend/deployment.env |
            sudo -n /usr/local/sbin/apipilot-apply-deployment-env --check /etc/apipilot/apipilot.env
      - name: Install immutable backend release
        id: install
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo -n /usr/local/sbin/apipilot-origin3-deploy \
            '${{ inputs.release_tag }}' \
            '${{ needs.verify.outputs.source_sha }}' \
            "$GITHUB_WORKSPACE/release-assets/backend-release-linux-amd64.tar.gz" | tee deploy-result.txt
          for key in previous current backup health; do
            value="$(awk -F= -v key="$key" '$1 == key {sub(/^[^=]*=/, ""); print; exit}' deploy-result.txt)"
            test -n "$value"
            printf '%s=%s\n' "$key" "$value" >> "$GITHUB_OUTPUT"
          done
      - name: Verify production health
        id: health
        shell: bash
        run: |
          set -Eeuo pipefail
          wait_for_health() {
            local name="$1"
            local output_file="$2"
            local attempt
            local url="$API_HEALTH_BASE_URL/health/$name"

            for attempt in $(seq 1 "$HEALTH_RETRY_ATTEMPTS"); do
              if curl --fail --silent --show-error --max-time 10 "$url" >"$output_file"; then
                cat "$output_file"
                return 0
              fi
              printf 'health %s is not ready (attempt %s/%s); retrying in %ss\n' \
                "$name" "$attempt" "$HEALTH_RETRY_ATTEMPTS" "$HEALTH_RETRY_DELAY_SECONDS" >&2
              sleep "$HEALTH_RETRY_DELAY_SECONDS"
            done

            printf '::error::health %s did not become ready within %ss\n' \
              "$name" "$((HEALTH_RETRY_ATTEMPTS * HEALTH_RETRY_DELAY_SECONDS))" >&2
            return 1
          }

          wait_for_health live health-live.json
          wait_for_health ready health-ready.json
          printf 'live=ok\nready=ok\n' >> "$GITHUB_OUTPUT"
      - name: Publish deployment summary
        if: always()
        shell: bash
        run: |
          {
            echo "## Backend production deployment"
            echo "- Source SHA: \`${{ needs.verify.outputs.source_sha }}\`"
            echo "- Previous release: \`${{ steps.install.outputs.previous || 'not recorded' }}\`"
            echo "- Current release: \`${{ steps.install.outputs.current || 'not recorded' }}\`"
            echo "- Backup checkpoint: \`${{ steps.install.outputs.backup || 'not recorded' }}\`"
            echo "- Helper health: \`${{ steps.install.outputs.health || 'not recorded' }}\`"
            echo "- Public health: live=${{ steps.health.outputs.live || 'not completed' }}, ready=${{ steps.health.outputs.ready || 'not completed' }}"
          } >> "$GITHUB_STEP_SUMMARY"
